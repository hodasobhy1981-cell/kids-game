``
<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لعبة أسئلة الفواكه</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background-color: #f0f8ff;
            color: #333;
            text-align: center;
            padding: 20px;
        }
        .question {
            font-size: 24px;
            margin: 20px 0;
        }
        .options {
            margin: 20px 0;
        }
        .option {
            background-color: #ffcccb;
            border: none;
            padding: 10px 20px;
            margin: 10px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 18px;
        }
        .option:hover {
            background-color: #ff9999;
        }
        #result {
            display: none;
            font-size: 28px;
            margin-top: 20px;
        }
        .emoji {
            font-size: 30px;
        }
    </style>
</head>
<body>
    <h1>لعبة أسئلة الفواكه 🍎🍌🍉</h1>
    <div id="quiz-container">
        <div class="question" id="question"></div>
        <div class="options" id="options"></div>
        <button id="next" class="option" style="display: none;">التالي</button>
    </div>
    <div id="result"></div>

    <script>
        const questions = [
            {
                question: "ما لون التفاح؟",
                options: ["أحمر 🍏", "أصفر 🍋", "أخضر 🍏"],
                answer: 0
            },
            {
                question: "ما هي الفاكهة الطويلة؟",
                options: ["كمثرى 🍐", "موز 🍌", "برتقال 🍊"],
                answer: 1
            },
            {
                question: "ما الفاكهة التي تحتوي على قلب؟",
                options: ["أناناس 🍍", "تفاح 🍏", "بطيخ 🍉"],
                answer: 2
            },
            {
                question: "ما هي الفاكهة المدورة؟",
                options: ["توت 🍇", "فراولة 🍓", "ليمون 🍋"],
                answer: 1
            },
            {
                question: "أي فاكهة تعتبر ملكة الفواكه؟",
                options: ["مانجو 🥭", "فراولة 🍓", "كرز 🍒"],
                answer: 0
            }
        ];

        let currentQuestion = 0;
        let score = 0;

        function loadQuestion() {
            const questionContainer = document.getElementById("question");
            const optionsContainer = document.getElementById("options");
            const nextButton = document.getElementById("next");

            questionContainer.innerText = questions[currentQuestion].question;
            optionsContainer.innerHTML = "";
            questions[currentQuestion].options.forEach((option, index) => {
                const button = document.createElement("button");
                button.innerText = option;
                button.className = "option";
                button.onclick = () => selectOption(index);
                optionsContainer.appendChild(button);
            });

            nextButton.style.display = "none";
        }

        function selectOption(index) {
            if (index === questions[currentQuestion].answer) {
                score++;
            }
            document.getElementById("next").style.display = "inline-block";
            Array.from(document.querySelectorAll(".option")).forEach(button => button.disabled = true);
        }

        document.getElementById("next").onclick = () => {
            currentQuestion++;
            if (currentQuestion < questions.length) {
                loadQuestion();
            } else {
                showResult();
            }
        };

        function showResult() {
            document.getElementById("quiz-container").style.display = "none";
            const resultContainer = document.getElementById("result");
            resultContainer.innerText = `لقد حصلت على ${score} من ${questions.length} 🎉`;
            resultContainer.style.display = "block";
        }

        loadQuestion();
    </script>
</body>
</html>
