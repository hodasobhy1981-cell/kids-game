<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لعبة الأسئلة حول الفواكه</title>
    <link href="https://fonts.googleapis.com/css2?family=Comic+Neue:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(45deg, #ffcc00, #ff6699);
            font-family: 'Comic Neue', cursive;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            flex-direction: column;
        }
        .container {
            background: white;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
            text-align: center;
            width: 90%;
            max-width: 400px;
        }
        .button {
            background-color: #ff66b2;
            color: white;
            border: none;
            border-radius: 25px;
            padding: 15px;
            margin: 10px;
            font-size: 18px;
            cursor: pointer;
            transition: all 0.3s;
            width: 100%;
        }
        .button:hover {
            transform: scale(1.05);
        }
        #progressBar {
            width: 100%;
            background-color: #e0e0e0;
            border-radius: 10px;
            margin-bottom: 20px;
        }
        #progress {
            height: 20px;
            background-color: #4caf50;
            width: 0;
            border-radius: 10px;
        }
        .result {
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <div id="progressBar"><div id="progress"></div></div>
        <h1 id="questionText"></h1>
        <div id="options"></div>
        <div class="result">
            <h2 id="resultText"></h2>
            <button class="button" onclick="restart()">إعادة اللعب</button>
        </div>
    </div>
    <script>
        const questions = [
            {
                question: "ما هي الفاكهة التي لها قشرة صفراء؟ 🍌",
                options: ["تفاح 🍏", "موز 🍌", "برتقال 🍊"],
                answer: 1
            },
            {
                question: "ما هي الفاكهة التي نستخدمها في العصائر والث smoothies؟ 🍓",
                options: ["فراولة 🍓", "كيوي 🥝", "عنب 🍇"],
                answer: 0
            },
            {
                question: "ما هي الفاكهة التي تأكل مع قشرة؟ 🍊",
                options: ["برتقال 🍊", "بطيخ 🍉", "خوخ 🍑"],
                answer: 0
            },
            {
                question: "ما هي الفاكهة الحمراء المعروفة؟ 🍏",
                options: ["تفاح 🍏", "موز 🍌", "كمثرى 🍐"],
                answer: 0
            },
            {
                question: "ما هي الفاكهة التي تأتي في لونين الأصفر والأخضر؟ 🥑",
                options: ["ليمون 🍋", "أفوكادو 🥑", "أناناس 🍍"],
                answer: 1
            }
        ];

        let currentQuestion = 0;
        let score = 0;

        function loadQuestion() {
            const question = questions[currentQuestion];
            document.getElementById("questionText").innerText = question.question;
            const optionsDiv = document.getElementById("options");
            optionsDiv.innerHTML = '';
            question.options.forEach((option, index) => {
                const button = document.createElement("button");
                button.className = 'button';
                button.innerText = option;
                button.onclick = () => checkAnswer(index);
                optionsDiv.appendChild(button);
            });
            updateProgress();
        }

        function checkAnswer(selected) {
            const question = questions[currentQuestion];
            if (selected === question.answer) {
                document.querySelectorAll('.button')[selected].style.backgroundColor = 'green';
                document.querySelectorAll('.button')[selected].innerText += ' ✅';
                score++;
            } else {
                document.querySelectorAll('.button')[selected].style.backgroundColor = 'red';
                document.querySelectorAll('.button')[selected].innerText += ' ❌';
                document.querySelectorAll('.button')[question.answer].style.backgroundColor = 'green';
                document.querySelectorAll('.button')[question.answer].innerText += ' ✅';
            }
            currentQuestion++;
            setTimeout(() => {
                if (currentQuestion < questions.length) {
                    loadQuestion();
                } else {
                    showResult();
                }
            }, 2000);
        }

        function updateProgress() {
            const progress = (currentQuestion / questions.length) * 100;
            document.getElementById("progress").style.width = progress + '%';
        }

        function showResult() {
            document.querySelector(".result").style.display = 'block';
            document.querySelector(".container").style.display = 'none';
            const resultText = document.getElementById("resultText");
            resultText.innerText = `لقد أجبت بشكل صحيح على ${score} من 5!`;
            if(score === 5) {
                resultText.innerText += '\nعمل رائع!';
            } else if(score >= 3) {
                resultText.innerText += '\nأحسنت، حاول مرة أخرى!';
            } else {
                resultText.innerText += '\nلا تيأس، قم بتحسين مهاراتك!';
            }
        }

        function restart() {
            currentQuestion = 0;
            score = 0;
            document.querySelector(".result").style.display = 'none';
            document.querySelector(".container").style.display = 'block';
            loadQuestion();
        }

        loadQuestion();
    </script>
</body>
</html>
