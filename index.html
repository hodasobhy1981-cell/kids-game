<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لعبة أسئلة وأجوبة - الأرقام</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Fredoka', sans-serif;
            background: linear-gradient(135deg, #FFABAB, #FFC3A0);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .card {
            background: white;
            border-radius: 15px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            padding: 20px;
            text-align: center;
            width: 90%;
            max-width: 500px;
        }
        button {
            background: #FF677D;
            color: white;
            border: none;
            padding: 15px;
            border-radius: 25px;
            margin: 10px 0;
            width: 80%;
            font-size: 20px;
            cursor: pointer;
            transition: background 0.3s;
        }
        button:hover {
            background: #FF3D47;
        }
        .correct {
            background: #4CAF50;
        }
        .wrong {
            background: #F44336;
        }
        .progress {
            width: 100%;
            height: 5px;
            background: #ddd;
            border-radius: 5px;
            margin-bottom: 20px;
        }
        .progress-bar {
            height: 100%;
            background: #FF677D;
            width: 0;
            border-radius: 5px;
        }
        .result {
            display: none;
            font-size: 24px;
        }
        @media (max-width: 600px) {
            button {
                font-size: 18px;
            }
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="progress">
            <div class="progress-bar" id="progress-bar"></div>
        </div>
        <h2 id="question-text">السؤال 1</h2>
        <div id="options"></div>
        <div class="result" id="result"></div>
        <button id="next-btn" style="display: none;" onclick="nextQuestion()">التالي</button>
    </div>

    <script>
        const questions = [
            { question: "ما هو الرقم الذي يلي 1؟", options: ["2", "3", "4"], answer: 0 },
            { question: "ما هو الرقم الذي يسبق 5؟", options: ["4", "3", "6"], answer: 0 },
            { question: "ما هو الرقم 7؟", options: ["6", "7", "8"], answer: 1 },
            { question: "ما هو الرقم 10؟", options: ["9", "10", "11"], answer: 1 },
            { question: "ما هو الرقم 3 زائد 2؟", options: ["4", "5", "6"], answer: 1 }
        ];
        let currentQuestionIndex = 0;
        let score = 0;

        function loadQuestion() {
            const questionData = questions[currentQuestionIndex];
            document.getElementById("question-text").innerText = questionData.question;
            const optionsContainer = document.getElementById("options");
            optionsContainer.innerHTML = "";
            questionData.options.forEach((option, index) => {
                const button = document.createElement("button");
                button.innerText = option;
                button.onclick = () => selectAnswer(index);
                optionsContainer.appendChild(button);
            });
            updateProgressBar();
        }

        function selectAnswer(selectedIndex) {
            const questionData = questions[currentQuestionIndex];
            const buttons = document.querySelectorAll("#options button");
            if (selectedIndex === questionData.answer) {
                buttons[selectedIndex].classList.add("correct");
                buttons[selectedIndex].innerText += " ✅";
                score++;
            } else {
                buttons[selectedIndex].classList.add("wrong");
                buttons[selectedIndex].innerText += " ❌";
                buttons[questionData.answer].classList.add("correct");
                buttons[questionData.answer].innerText += " ✅";
            }
            document.querySelectorAll("#options button").forEach(button => button.disabled = true);
            document.getElementById("next-btn").style.display = "block";
        }

        function nextQuestion() {
            currentQuestionIndex++;
            if (currentQuestionIndex < questions.length) {
                loadQuestion();
                document.getElementById("next-btn").style.display = "none";
            } else {
                showResult();
            }
        }

        function updateProgressBar() {
            const progressBar = document.getElementById("progress-bar");
            const progressPercentage = ((currentQuestionIndex + 1) / questions.length) * 100;
            progressBar.style.width = `${progressPercentage}%`;
        }

        function showResult() {
            document.querySelector(".card").innerHTML = `
               <h2>نتيجتك: ${score} من ${questions.length}</h2>
               <p>${score >= 3 ? "رائع! استمر في التعلم!" : "تحتاج إلى المزيد من الممارسة!"}</p>
               <button onclick="location.reload()">إعادة اللعب</button>
           `;
        }

        loadQuestion();
    </script>
</body>
</html>
