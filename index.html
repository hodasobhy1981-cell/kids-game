<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400&display=swap" rel="stylesheet">
    <title>لعبة أسئلة وأجوبة عن وسائل المواصلات</title>
    <style>
        body {
            font-family: 'Fredoka', sans-serif;
            background: linear-gradient(to right, #fbc2eb, #a6c1ee);
            text-align: center;
            padding: 20px;
        }
        .card {
            background: white;
            border-radius: 15px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
            padding: 20px;
            margin: 20px auto;
            width: 90%;
            max-width: 400px;
        }
        button {
            border: none;
            border-radius: 25px;
            padding: 15px;
            font-size: 18px;
            background: #007bff;
            color: white;
            cursor: pointer;
            width: 100%;
            margin: 10px 0;
            transition: background 0.3s;
        }
        button:hover {
            background: #0056b3;
        }
        .progress {
            height: 20px;
            background: #ddd;
            border-radius: 10px;
            margin: 20px 0;
        }
        .progress-bar {
            height: 100%;
            background: #4caf50;
            width: 0%;
            border-radius: 10px;
        }
        .result {
            display: none;
            font-size: 22px;
        }
        .correct {
            color: green;
        }
        .incorrect {
            color: red;
        }
    </style>
</head>
<body>

<div class="card" id="quiz">
    <div class="progress"><div class="progress-bar" id="progressBar"></div></div>
    <h2 id="question"></h2>
    <div id="options"></div>
    <div id="result" class="result"></div>
</div>

<script>
    const questions = [
        { emoji: "🚗", answer: "سيارة", options: ["قطار", "سيارة", "حافلة"] },
        { emoji: "✈️", answer: "طيارة", options: ["سفينة", "دراجة", "طيارة"] },
        { answer: "قطار", emoji: "🚆", options: ["طائرة", "دراجة", "قطار"] },
        { answer: "سفينة", emoji: "🚢", options: ["سيارة", "سفينة", "حافلة"] },
        { emoji: "🚲", answer: "دراجة", options: ["حافلة", "سيارة", "دراجة"] },
    ];

    let currentQuestion = 0;
    let correctAnswers = 0;

    function loadQuestion() {
        const questionData = questions[currentQuestion];
        const questionEl = document.getElementById('question');
        const optionsEl = document.getElementById('options');
        const progressBar = document.getElementById('progressBar');

        progressBar.style.width = ((currentQuestion + 1) / questions.length) * 100 + '%';

        if (questionData.emoji) {
            questionEl.textContent = questionData.emoji;
        } else {
            questionEl.textContent = questionData.answer;
        }

        optionsEl.innerHTML = '';

        questionData.options.forEach(option => {
            const button = document.createElement('button');
            button.textContent = option;
            button.onclick = () => checkAnswer(option);
            optionsEl.appendChild(button);
        });
    }

    function checkAnswer(selected) {
        const questionData = questions[currentQuestion];
        const resultEl = document.getElementById('result');

        if (selected === questionData.answer) {
            correctAnswers++;
            resultEl.textContent = "✅ إجابة صحيحة!";
            resultEl.className = 'result correct';
        } else {
            resultEl.textContent = `❌ إجابة خاطئة! الإجابة الصحيحة هي: ${questionData.answer}`;
            resultEl.className = 'result incorrect';
        }

        currentQuestion++;
        if (currentQuestion < questions.length) {
            setTimeout(() => {
                resultEl.textContent = '';
                loadQuestion();
            }, 2000);
        } else {
            setTimeout(showResult, 2000);
        }
    }

    function showResult() {
        const quizEl = document.getElementById('quiz');
        quizEl.innerHTML = `
            <h2>انتهت اللعبة!</h2>
            <p>عدد الإجابات الصحيحة: ${correctAnswers} من ${questions.length}</p>
            <button onclick="restart()">إعادة اللعب</button>
        `;
    }

    function restart() {
        currentQuestion = 0;
        correctAnswers = 0;
        loadQuestion();
    }

    loadQuestion();
</script>

</body>
</html>
