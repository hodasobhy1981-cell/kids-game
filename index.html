<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لعبة أصوات الحيوانات</title>
    <style>
        body {
            background-color: #f9f9f9;
            font-family: 'Arial', sans-serif;
            text-align: center;
        }
        .question-container {
            background: white;
            border-radius: 15px;
            padding: 20px;
            margin: 20px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
        }
        .emoji {
            font-size: 100px;
        }
        .button {
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 10px;
            padding: 15px;
            font-size: 20px;
            margin: 10px;
            cursor: pointer;
            width: 80%;
        }
        .result {
            font-size: 24px;
            margin: 20px;
        }
        .progress {
            font-size: 18px;
            margin-bottom: 20px;
        }
        .success {
            background-color: lightgreen;
        }
        .error {
            background-color: lightcoral;
        }
    </style>
</head>
<body>

<div class="progress" id="progress">السؤال 1 من 5</div>
<div class="question-container" id="questionContainer">
    <div class="emoji" id="emoji">🐶</div>
    <div id="questionText">ماذا يقول هذا الحيوان؟</div>
    <button class="button" onclick="checkAnswer('نباح', 0)">نباح</button>
    <button class="button" onclick="checkAnswer('مواء', 1)">مواء</button>
    <button class="button" onclick="checkAnswer('خوار', 2)">خوار</button>
</div>

<div id="resultScreen" style="display:none;">
    <div class="result" id="resultText"></div>
    <button class="button" onclick="restartGame()">إعادة اللعب</button>
</div>

<script>
    const questions = [
        { emoji: "🐶", correct: "نباح" },
        { emoji: "🐱", correct: "مواء" },
        { emoji: "🐄", correct: "خوار" },
        { emoji: "🦁", correct: "زئير" },
        { emoji: "🐔", correct: "صوص" }
    ];
    const answers = [
        ["نباح", "مواء", "خوار"],
        ["مواء", "نباح", "خوار"],
        ["خوار", "مواء", "زئير"],
        ["زئير", "مواء", "نباح"],
        ["صوص", "خوار", "نباح"]
    ];
    let currentQuestion = 0;
    let score = 0;

    function checkAnswer(selected, index) {
        const correct = questions[currentQuestion].correct;
        if (selected === correct) {
            score++;
            document.getElementById('questionContainer').classList.add('success');
            setTimeout(() => document.getElementById('questionContainer').classList.remove('success'), 1000);
        } else {
            document.getElementById('questionContainer').classList.add('error');
            setTimeout(() => document.getElementById('questionContainer').classList.remove('error'), 1000);
            alert(`الإجابة الصحيحة هي: ${correct}`);
        }
        
        currentQuestion++;
        if (currentQuestion < questions.length) {
            loadQuestion();
        } else {
            showResults();
        }
    }

    function loadQuestion() {
        document.getElementById('progress').innerText = `السؤال ${currentQuestion + 1} من ${questions.length}`;
        document.getElementById('emoji').innerText = questions[currentQuestion].emoji;
        const buttons = document.querySelectorAll(".button");
        buttons.forEach((button, index) => {
            button.innerText = answers[currentQuestion][index];
        });
    }

    function showResults() {
        document.getElementById('questionContainer').style.display = 'none';
        document.getElementById('progress').style.display = 'none';
        document.getElementById('resultText').innerText = `لقد أجبت بشكل صحيح على ${score} من ${questions.length} أسئلة!`;
        document.getElementById('resultScreen').style.display = 'block';
    }

    function restartGame() {
        currentQuestion = 0;
        score = 0;
        document.getElementById('resultScreen').style.display = 'none';
        document.getElementById('questionContainer').style.display = 'block';
        document.getElementById('progress').style.display = 'block';
        loadQuestion();
    }

    loadQuestion();
</script>

</body>
</html>
