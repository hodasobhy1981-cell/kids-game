<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>لعبة الألوان للأطفال</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Comic Sans MS', 'Tahoma', sans-serif;
    background: linear-gradient(135deg, #a1c4fd, #c2e9fb);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 20px;
    text-align: center;
  }

  h1 {
    color: #333;
    font-size: 2.2rem;
    margin-bottom: 10px;
    text-shadow: 2px 2px 0 #fff;
  }

  #instruction {
    font-size: 1.5rem;
    margin-bottom: 25px;
    color: #444;
    background: #fff;
    padding: 12px 24px;
    border-radius: 20px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.15);
  }

  #instruction span {
    font-weight: bold;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(3, 100px);
    gap: 20px;
    justify-content: center;
  }

  .box {
    width: 100px;
    height: 100px;
    border-radius: 20px;
    cursor: pointer;
    box-shadow: 0 6px 0 rgba(0,0,0,0.2);
    transition: transform 0.1s;
  }

  .box:active {
    transform: scale(0.9);
  }

  #score {
    margin-top: 25px;
    font-size: 1.3rem;
    color: #333;
    background: #ffffffcc;
    padding: 10px 20px;
    border-radius: 15px;
  }

  #message {
    margin-top: 15px;
    font-size: 1.6rem;
    min-height: 40px;
  }

  .correct {
    animation: pop 0.4s ease;
  }

  @keyframes pop {
    0% { transform: scale(1); }
    50% { transform: scale(1.15); }
    100% { transform: scale(1); }
  }
</style>
</head>
<body>

  <h1>🎨 لعبة الألوان</h1>
  <div id="instruction">دوس على اللون <span id="targetColorName"></span></div>

  <div class="grid" id="grid"></div>

  <div id="message"></div>
  <div id="score">النقاط: <span id="scoreValue">0</span></div>

<script>
  const colors = [
    { name: "الأحمر", hex: "#e74c3c" },
    { name: "الأزرق", hex: "#3498db" },
    { name: "الأخضر", hex: "#2ecc71" },
    { name: "الأصفر", hex: "#f1c40f" },
    { name: "البرتقالي", hex: "#e67e22" },
    { name: "البنفسجي", hex: "#9b59b6" }
  ];

  let score = 0;
  let targetColor = null;

  const grid = document.getElementById('grid');
  const targetColorName = document.getElementById('targetColorName');
  const scoreValue = document.getElementById('scoreValue');
  const message = document.getElementById('message');

  function shuffle(array) {
    return array.sort(() => Math.random() - 0.5);
  }

  function newRound() {
    message.textContent = "";
    grid.innerHTML = "";

    const roundColors = shuffle([...colors]).slice(0, 6);
    targetColor = roundColors[Math.floor(Math.random() * roundColors.length)];
    targetColorName.textContent = targetColor.name;

    shuffle(roundColors).forEach(color => {
      const box = document.createElement('div');
      box.className = 'box';
      box.style.backgroundColor = color.hex;
      box.addEventListener('click', () => checkAnswer(color, box));
      grid.appendChild(box);
    });
  }

  function checkAnswer(color, box) {
    if (color.hex === targetColor.hex) {
      score++;
      scoreValue.textContent = score;
      message.textContent = "🎉 برافو! صح!";
      box.classList.add('correct');
      setTimeout(newRound, 800);
    } else {
      message.textContent = "❌ حاول تاني!";
    }
  }

  newRound();
</script>

</body>
</html>
