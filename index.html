<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400&display=swap" rel="stylesheet">
    <title>لعبة أسئلة وأجوبة</title>
    <style>
        body {
            font-family: 'Fredoka', sans-serif;
            background: linear-gradient(to right, #ff7e5f, #feb47b);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            color: #333;
        }
        .container {
            background: white;
            border-radius: 15px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
            padding: 20px;
            text-align: center;
            width: 90%;
            max-width: 600px;
        }
        .shape {
            width: 100px;
            height: 100px;
            margin: 20px auto;
        }
        .buttons {
            margin-top: 20px;
        }
        button {
            background: #4CAF50;
            color: white;
            border: none;
            border-radius: 10px;
            padding: 10px 20px;
            font-size: 18px;
            cursor: pointer;
            margin: 5px;
            transition: background 0.3s;
        }
        button:hover {
            background: #45a049;
        }
        .progress {
            font-size: 16px;
            margin: 10px 0;
        }
        .result {
            display: none;
            font-size: 24px;
        }
        .correct {
            background-color: #4CAF50;
        }
        .wrong {
            background-color: #f44336;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="progress">السؤال <span id="current-question">1</span> من <span>5</span></div>
        <div id="shape" class="shape"></div>
        <h2 id="question-text"></h2>
        <div class="buttons" id="options"></div>
        <div class="result" id="result-text"></div>
        <button id="restart" style="display:none;">إعادة اللعب</button>
    </div>

    <script>
        const questions = [
            { shape: 'مربع', css: 'square', options: ['مربع', 'مثلث', 'نجمة'] },
            { shape: 'دائرة', css: 'circle', options: ['مستطيل', 'دائرة', 'قلب'] },
            { shape: 'مثلث', css: 'triangle', options: ['مثلث', 'مربع', 'نجمة'] },
            { shape: 'مستطيل', css: 'rectangle', options: ['مستطيل', 'قلب', 'دائرة'] },
            { shape: 'نجمة', css: 'star', options: ['قلب', 'نجمة', 'مثلث'] },
        ];

        let currentQuestionIndex = 0;
        let score = 0;

        function renderQuestion() {
            const question = questions[currentQuestionIndex];
            document.getElementById('current-question').innerText = currentQuestionIndex + 1;
            document.getElementById('question-text').innerText = `ما هو اسم الشكل؟`;
            const shapeDiv = document.getElementById('shape');
            shapeDiv.className = `shape ${question.css}`;
            const optionsContainer = document.getElementById('options');
            optionsContainer.innerHTML = '';
            question.options.forEach(option => {
                const button = document.createElement('button');
                button.innerText = option;
                button.onclick = () => checkAnswer(option === question.shape);
                optionsContainer.appendChild(button);
            });
        }

        function checkAnswer(isCorrect) {
            const optionsContainer = document.getElementById('options');
            optionsContainer.querySelectorAll('button').forEach(button => {
                button.disabled = true;
                if (button.innerText === questions[currentQuestionIndex].shape) {
                    button.classList.add('correct');
                    button.innerHTML += ' ✅';
                } else {
                    button.classList.add('wrong');
                    button.innerHTML += ' ❌';
                }
            });
            if (isCorrect) {
                score++;
            }
            currentQuestionIndex++;
            if (currentQuestionIndex < questions.length) {
                setTimeout(renderQuestion, 1500);
            } else {
                setTimeout(showResult, 1500);
            }
        }

        function showResult() {
            document.getElementById('result-text').innerHTML = `لقد حصلت على ${score} من ${questions.length} تنجح!`;
            document.getElementById('result-text').style.display = 'block';
            document.getElementById('options').style.display = 'none';
            document.getElementById('restart').style.display = 'block';
        }

        document.getElementById('restart').onclick = () => {
            currentQuestionIndex = 0;
            score = 0;
            document.getElementById('options').style.display = 'block';
            document.getElementById('result-text').style.display = 'none';
            document.getElementById('restart').style.display = 'none';
            renderQuestion();
        };

        document.addEventListener('DOMContentLoaded', renderQuestion);
    </script>
    <style>
        .square {
            width: 100px;
            height: 100px;
            background-color: #FF5733;
        }
        .circle {
            width: 100px;
            height: 100px;
            background-color: #C70039;
            border-radius: 50%;
        }
        .triangle {
            width: 0;
            height: 0;
            border-left: 50px solid transparent;
            border-right: 50px solid transparent;
            border-bottom: 100px solid #900C3F;
        }
        .rectangle {
            width: 150px;
            height: 100px;
            background-color: #581845;
        }
        .star {
            display: inline-block;
            width: 0;
            height: 0;
            border-left: 50px solid transparent;
            border-right: 50px solid transparent;
            border-bottom: 90px solid #FFC300;
            transform: rotate(35deg);
        }
        .star:before {
            border-bottom: 70px solid #FFC300;
            border-left: 30px solid transparent;
            border-right: 30px solid transparent;
            content: '';
            display: block;
            height: 0;
            width: 0;
            position: relative;
            top: -51px;
            left: -30px;
            transform: rotate(-70deg);
        }
    </style>
</body>
</html>
