<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لعبة أصوات الحيوانات</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f8ff;
            text-align: center;
            color: #333;
            margin: 0;
            padding: 0;
        }
        .question-card {
            background-color: white;
            border-radius: 12px;
            padding: 20px;
            margin: 20px;
            box-shadow: 0px 0px 10px rgba(0,0,0,0.1);
        }
        .emoji {
            font-size: 100px;
        }
        .button {
            background-color: #8ad8ff;
            border: none;
            border-radius: 8px;
            padding: 15px;
            font-size: 24px;
            margin: 10px;
            cursor: pointer;
            width: 80%;
        }
        .progress {
            font-size: 20px;
            margin: 20px;
        }
        .result {
            display: none;
            background-color: #fff;
            border-radius: 12px;
            padding: 20px;
            margin: 20px;
            box-shadow: 0px 0px 10px rgba(0,0,0,0.1);
        }
        .correct {
            color: green;
        }
        .incorrect {
            color: red;
        }
    </style>
</head>
<body>

<div class="progress" id="progress"></div>
<div class="question-card" id="questionCard">
    <div id="emoji" class="emoji"></div>
    <div id="questionText"></div>
    <button class="button" onclick="checkAnswer('A')">مواء</button>
    <button class="button" onclick="checkAnswer('B')">نباح</button>
    <button class="button" onclick="checkAnswer('C')">خوار</button>
</div>

<div class="result" id="resultCard">
    <div id="resultText"></div>
    <button class="button" onclick="restartGame()">إعادة اللعب</button>
</div>

<script>
    const questions = [
        { emoji: '🐱', question: 'ما هو صوت القطة؟', answer: 'A', options: ['مواء', 'نباح', 'خوار'] },
        { emoji: '🐶', question: 'ما هو صوت الكلب؟', answer: 'B', options: ['مواء', 'نباح', 'خوار'] },
        { emoji: '🐄', question: 'ما هو صوت البقرة؟', answer: 'C', options: ['مواء', 'نباح', 'خوار'] },
        { emoji: '🦁', question: 'ما هو صوت الأسد؟', answer: 'C', options: ['مواء', 'نباح', 'خوار'] },
        { emoji: '🐔', question: 'ما هو صوت الديك؟', answer: 'A', options: ['مواء', 'نباح', 'خوار'] },
    ];
    let currentQuestion = 0;
    let score = 0;

    function loadQuestion() {
        const question = questions[currentQuestion];
        document.getElementById('emoji').innerText = question.emoji;
        document.getElementById('questionText').innerText = question.question;
        document.getElementById('progress').innerText = `السؤال ${currentQuestion + 1} من ${questions.length}`;
        document.getElementById('resultCard').style.display = 'none';
        document.getElementById('questionCard').style.display = 'block';
    }

    function checkAnswer(selected) {
        const question = questions[currentQuestion];
        const correctAnswer = question.answer;
        if (selected === correctAnswer) {
            score++;
            alert("✅ إجابة صحيحة!");
        } else {
            alert("❌ إجابة خاطئة! الإجابة الصحيحة هي: " + question.options[correctAnswer.charCodeAt(0) - 65]);
        }
        currentQuestion++;
        if (currentQuestion < questions.length) {
            loadQuestion();
        } else {
            showResult();
        }
    }

    function showResult() {
        document.getElementById('questionCard').style.display = 'none';
        const resultText = `لقد أجبت بشكل صحيح على ${score} من ${questions.length} أسئلة!`;
        document.getElementById('resultText').innerText = resultText;
        document.getElementById('resultCard').style.display = 'block';
    }

    function restartGame() {
        currentQuestion = 0;
        score = 0;
        loadQuestion();
    }

    window.onload = loadQuestion;
</script>

</body>
</html>
