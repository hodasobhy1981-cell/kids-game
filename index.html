``
<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لعبة أسئلة وأجوبة للأشكال الهندسية</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Fredoka', cursive;
            background: linear-gradient(to right, #ffccbc, #ffab91);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }
        .container {
            background: white;
            border-radius: 15px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            padding: 20px;
            text-align: center;
            width: 90%;
            max-width: 400px;
        }
        .shape {
            width: 100px;
            height: 100px;
            margin: 20px auto;
        }
        .button {
            border: none;
            border-radius: 30px;
            padding: 15px 30px;
            font-size: 18px;
            margin: 10px;
            cursor: pointer;
            transition: background-color 0.3s;
        }
        .button:hover {
            opacity: 0.8;
        }
        #progress {
            width: 100%;
            height: 20px;
            background: #f0f0f0;
            border-radius: 10px;
            margin-bottom: 20px;
        }
        #progress span {
            display: block;
            height: 100%;
            width: 0;
            background: #49c72b;
            border-radius: 10px;
        }
        .result {
            display: none;
        }
        .correct {
            background-color: #4caf50;
        }
        .wrong {
            background-color: #f44336;
        }
    </style>
</head>
<body>
    <div class="container">
        <div id="progress"><span></span></div>
        <div class="shape" id="shape"></div>
        <h2 id="question"></h2>
        <button class="button" onclick="checkAnswer(0)"></button>
        <button class="button" onclick="checkAnswer(1)"></button>
        <button class="button" onclick="checkAnswer(2)"></button>
        <div class="result" id="result"></div>
        <button class="button" id="restart" style="display:none;" onclick="restartGame()">إعادة اللعب</button>
    </div>

    <script>
        const questions = [
            { shape: 'مربع', options: ['مستطيل', 'مربع', 'مثلث'], draw: drawSquare },
            { shape: 'دائرة', options: ['قلب', 'نجمة', 'دائرة'], draw: drawCircle },
            { shape: 'مثلث', options: ['مثلث', 'مستطيل', 'مربع'], draw: drawTriangle },
            { shape: 'مستطيل', options: ['دائرة', 'مستطيل', 'نجمة'], draw: drawRectangle },
            { shape: 'نجمة', options: ['قلب', 'نجمة', 'مثلث'], draw: drawStar },
        ];
        let currentQuestion = 0;
        let score = 0;

        function drawSquare() {
            document.getElementById('shape').style.width = '100px';
            document.getElementById('shape').style.height = '100px';
            document.getElementById('shape').style.backgroundColor = '#ff5722';
            document.getElementById('shape').style.borderRadius = '0';
        }
        function drawCircle() {
            document.getElementById('shape').style.width = '100px';
            document.getElementById('shape').style.height = '100px';
            document.getElementById('shape').style.backgroundColor = '#3f51b5';
            document.getElementById('shape').style.borderRadius = '50%';
        }
        function drawTriangle() {
            const shape = document.getElementById('shape');
            shape.style.width = '0';
            shape.style.height = '0';
            shape.style.borderLeft = '50px solid transparent';
            shape.style.borderRight = '50px solid transparent';
            shape.style.borderBottom = '100px solid #ffc107';
        }
        function drawRectangle() {
            document.getElementById('shape').style.width = '150px';
            document.getElementById('shape').style.height = '100px';
            document.getElementById('shape').style.backgroundColor = '#8bc34a';
            document.getElementById('shape').style.borderRadius = '0';
        }
        function drawStar() {
            const star = document.getElementById('shape');
            star.style.width = '0';
            star.style.height = '0';
            star.style.borderLeft = '30px solid transparent';
            star.style.borderRight = '30px solid transparent';
            star.style.borderBottom = '50px solid #ffeb3b';
            star.style.position = 'relative';
            star.style.transform = 'rotate(35deg)';
            star.innerHTML = `<div style="position: absolute; width: 0; height: 0; border-left: 30px solid transparent; border-right: 30px solid transparent; border-bottom: 50px solid #ffeb3b; top: -30px; left: -30px; transform: rotate(70deg);"></div>`;
        }

        function loadQuestion() {
            document.getElementById('result').style.display = 'none';
            const question = questions[currentQuestion];
            question.draw();
            document.getElementById('question').innerText = `ما اسم الشكل؟`;
            document.querySelectorAll('.button').forEach((button, index) => {
                button.innerText = question.options[index];
                button.className = 'button';
            });
            updateProgress();
        }

        function checkAnswer(index) {
            const question = questions[currentQuestion];
            const selectedAnswer = question.options[index];
            const result = document.getElementById('result');

            if (selectedAnswer === question.shape) {
                score++;
                result.innerText = '✅ إجابة صحيحة!';
                result.className = 'correct';
            } else {
                result.innerText = `❌ إجابة خاطئة! الشكل الصحيح هو ${question.shape}`;
                result.className = 'wrong';
            }
            result.style.display = 'block';

            document.querySelectorAll('.button').forEach((button, btnIndex) => {
                if (btnIndex === index) {
                    button.className += selectedAnswer === question.shape ? ' correct' : ' wrong';
                }
                button.disabled = true;
            });
            
            currentQuestion++;

            if (currentQuestion < questions.length) {
                setTimeout(loadQuestion, 2000);
            } else {
                setTimeout(showResult, 2000);
            }
        }

        function showResult() {
            document.querySelector('.container').innerHTML = `
                <h2>نتيجتك: ${score} من ${questions.length}</h2>
                <p>${score === questions.length ? 'رائع! كل الأشكال كانت صحيحة!' : 'جيد جداً! استمر في التعلم!'}</p>
                <button class="button" onclick="restartGame()">إعادة اللعب</button>
            `;
        }

        function restartGame() {
            currentQuestion = 0;
            score = 0;
            document.querySelector('.container').innerHTML = `
                <div id="progress"><span></span></div>
                <div class="shape" id="shape"></div>
                <h2 id="question"></h2>
                <button class="button" onclick="checkAnswer(0)"></button>
                <button class="button" onclick="checkAnswer(1)"></button>
                <button class="button" onclick="checkAnswer(2)"></button>
                <div class="result" id="result"></div>
                <button class="button" id="restart" style="display:none;" onclick="restartGame()">إعادة اللعب</button>
            `;
            loadQuestion();
        }

        function updateProgress() {
            const progressBar = document.querySelector('#progress span');
            progressBar.style.width = `${((currentQuestion + 1) / questions.length) * 100}%`;
        }

        loadQuestion();
    </script>
</body>
</html>
