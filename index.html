<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لعبة الحروف الإنجليزية</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background-color: #f0f8ff;
            color: #333;
            text-align: center;
            padding: 20px;
        }
        h1 {
            color: #ff6347;
        }
        .question {
            font-size: 3rem;
            margin: 20px 0;
        }
        .options {
            margin: 20px 0;
        }
        button {
            font-size: 2rem;
            padding: 10px 20px;
            margin: 10px;
            border: none;
            background-color: #28a745;
            color: white;
            border-radius: 5px;
            cursor: pointer;
        }
        button:hover {
            background-color: #218838;
        }
        .result {
            font-size: 2rem;
            margin-top: 30px;
            display: none;
        }
    </style>
</head>
<body>
    <h1>لعبة الحروف الإنجليزية</h1>
    <div class="question" id="question"></div>
    <div class="options" id="options"></div>
    <div class="result" id="result"></div>
    <button onclick="startGame()">ابدأ اللعبة</button>

    <script>
        const questions = [
            { letter: 'A', options: ['A', 'b', 'C'], answer: 'A' },
            { letter: 'b', options: ['D', 'B', 'b'], answer: 'b' },
            { letter: 'C', options: ['c', 'A', 'C'], answer: 'C' },
            { letter: 'd', options: ['D', 'E', 'd'], answer: 'd' },
            { letter: 'E', options: ['e', 'f', 'E'], answer: 'E' }
        ];
        
        let currentQuestionIndex = 0;
        let score = 0;

        function startGame() {
            currentQuestionIndex = 0;
            score = 0;
            document.getElementById('result').style.display = 'none';
            nextQuestion();
        }

        function nextQuestion() {
            if (currentQuestionIndex < questions.length) {
                const question = questions[currentQuestionIndex];
                document.getElementById('question').innerText = question.letter;
                const optionsContainer = document.getElementById('options');
                optionsContainer.innerHTML = '';
                question.options.forEach(option => {
                    const button = document.createElement('button');
                    button.innerText = option;
                    button.onclick = () => checkAnswer(option);
                    optionsContainer.appendChild(button);
                });
            } else {
                showResult();
            }
        }

        function checkAnswer(selectedOption) {
            if (selectedOption === questions[currentQuestionIndex].answer) {
                score++;
            }
            currentQuestionIndex++;
            nextQuestion();
        }

        function showResult() {
            document.getElementById('question').innerText = '';
            document.getElementById('options').innerHTML = '';
            document.getElementById('result').innerText = `لقد حصلت على ${score} من ${questions.length} نقاط!`;
            document.getElementById('result').style.display = 'block';
        }
    </script>
</body>
</html>
