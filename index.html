<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لعبة أسئلة وأجوبة عن أصوات الحيوانات</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f8f9fa;
            color: #333;
            text-align: center;
            margin: 0;
            padding: 0;
        }
        .question-card {
            background: white;
            border-radius: 15px;
            padding: 20px;
            margin: 20px auto;
            width: 90%;
            max-width: 600px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
        }
        .emoji {
            font-size: 100px;
        }
        .button {
            display: block;
            padding: 15px;
            margin: 10px 0;
            border: none;
            border-radius: 10px;
            background-color: #007bff;
            color: white;
            font-size: 20px;
            cursor: pointer;
            width: 100%;
        }
        .button:hover {
            opacity: 0.8;
        }
        .result {
            font-size: 24px;
            margin-top: 20px;
        }
        .progress-bar {
            width: 100%;
            background: #eee;
            border-radius: 10px;
            margin: 20px auto 10px;
            height: 10px;
            position: relative;
        }
        .progress {
            height: 100%;
            background: #007bff;
            border-radius: 10px;
            transition: width 0.3s;
        }
    </style>
</head>
<body>

<div class="question-card" id="questionCard">
    <div class="progress-bar"><div class="progress" id="progress" style="width: 0%;"></div></div>
    <div class="emoji" id="emoji"></div>
    <div id="question"></div>
    <button class="button" onclick="checkAnswer(0)"></button>
    <button class="button" onclick="checkAnswer(1)"></button>
    <button class="button" onclick="checkAnswer(2)"></button>
</div>
<div class="result" id="result" style="display: none;"></div>

<script>
    const questions = [
        {emoji: '🐱', question: 'ماذا تصدر القطة؟', answers: ['مواء', 'نباح', 'خوار'], correct: 0},
        {emoji: '🐶', question: 'ماذا يصدر الكلب؟', answers: ['مواء', 'نباح', 'خوار'], correct: 1},
        {emoji: '🐄', question: 'ماذا تصدر البقرة؟', answers: ['مواء', 'نباح', 'خوار'], correct: 2},
        {emoji: '🦁', question: 'ماذا يصدر الأسد؟', answers: ['مواء', 'زئير', 'خوار'], correct: 1},
        {emoji: '🐔', question: 'ماذا يصدر الديك؟', answers: ['مواء', 'نباح', 'صياح'], correct: 2}
    ];
    let currentQuestion = 0;
    let score = 0;

    function loadQuestion() {
        const questionData = questions[currentQuestion];
        document.getElementById('emoji').innerText = questionData.emoji;
        document.getElementById('question').innerText = questionData.question;
        const buttons = document.querySelectorAll('.button');
        buttons.forEach((button, index) => {
            button.innerText = questionData.answers[index];
            button.style.backgroundColor = '#007bff';
            button.disabled = false;
        });
        document.getElementById('progress').style.width = ((currentQuestion + 1) / questions.length * 100) + '%';
    }

    function checkAnswer(index) {
        const questionData = questions[currentQuestion];
        const buttons = document.querySelectorAll('.button');
        if (index === questionData.correct) {
            score++;
            buttons[index].style.backgroundColor = 'green';
            buttons[index].innerText += ' ✅';
        } else {
            buttons[index].style.backgroundColor = 'red';
            buttons[index].innerText += ' ❌';
            buttons[questionData.correct].style.backgroundColor = 'green';
            buttons[questionData.correct].innerText += ' ✅';
        }
        buttons.forEach(button => button.disabled = true);
        currentQuestion++;
        setTimeout(() => {
            if (currentQuestion < questions.length) {
                loadQuestion();
            } else {
                showResult();
            }
        }, 1500);
    }

    function showResult() {
        document.getElementById('questionCard').style.display = 'none';
        const resultMessage = `لقد أجبت على ${score} من ${questions.length} أسئلة بشكل صحيح! 🎉`;
        document.getElementById('result').innerText = resultMessage;
        document.getElementById('result').style.display = 'block';
        const replayButton = document.createElement('button');
        replayButton.innerText = 'إعادة اللعب';
        replayButton.className = 'button';
        replayButton.onclick = () => location.reload();
        document.getElementById('result').appendChild(replayButton);
    }

    loadQuestion();
</script>

</body>
</html>
